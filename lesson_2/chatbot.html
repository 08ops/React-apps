<!DOCTYPE html>
<html>
    <head>
        <title>Chatbot</title>
    </head>
    <body>
        <div class="js-container"></div>

        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
        <script type = "text/babel">

            function ChatInput() {
                return (
                    <>
                        <input placeholder="Send a message to ChatBot" size = "30" />
                        <button>Send</button>
                    </>
                );
            }

            function ChatMessage(props){
                const message = props.message;
                const sender = props.sender;

                if (sender === "user") {
                return(
                    <div>
                        {message}

                        <img src="user.png" alt="ChatBot" width="50" height="50" />
                    </div>

                );
            }

            else if (sender === "chatbot") {
                return(
                    <div>
                        <img src="robot.png" alt="ChatBot" width="50" height="50" />
                        {message}
                    </div>
                );
            }
        }
            
             const div =  (
            <>
               <ChatInput />
               <ChatMessage message="Hello, how can I help you?" sender="user" />
               <ChatMessage message="I'm a chatbot and I'm here to assist you!" sender="chatbot" />
               <ChatMessage message="can u get me today's date" sender="user" />
               <ChatMessage message="Sure! Today's date is June 6, 2024." sender="chatbot" />
            </>
            );

            const container = document.querySelector('.js-container');
            ReactDOM.createRoot(container).render(div);

        </script>
        
    </body>
</html>
